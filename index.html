<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360Drone – Compilatore ATM-05b</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #e8f0f7 0%, #f5f9ff 100%); min-height: 100vh; font-family: 'Trebuchet MS', Georgia, serif; }
    input, textarea, button, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #1a3c5e44; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const FIXED = { tel360: "0187 1755700", email360: "360drone@pec.it" };

// ✅ NUOVO: dizionario destinatari
const destinatari = {
  "LI P244": { A: "protocollo.prefrm@pec.interno.it", Cc: "protocollo@pec.enac.gov.it; mobilita.innovativa@enac.gov.it" },
  "R1": { A: "operazioni@enav.it", Cc: "mobilita.innovativa@enac.gov.it" },
  "P123": { A: "enac@pec.enac.gov.it", Cc: "" },
  // Aggiungi altre zone qui...
};

const emptyForm = {
  destA: "protocollo.prefrm@pec.interno.it",
  destCc: "protocollo@pec.enac.gov.it; mobilita.innovativa@enac.gov.it",
  richiedente: "", attestato: "",
  tipoAttivita: "", aeromobile: "",
  decollo: "", latDecollo: "", lonDecollo: "",
  atterraggio: "", latAtterraggio: "", lonAtterraggio: "",
  localita: "", zona: "",
  puntiLaterali: [{ nome: "", lat: "", lon: "" }, { nome: "", lat: "", lon: "" }],
  limVerticali: "inferiore GND / superiore 45 m AGL (147 ft)",
  capoluogo: "", aeroporto: "", distanza: "",
  dateOrari: "", nomePilota: "", telPilota: "", altreNotizie: "",
};

const s = {
  input: { width: "100%", padding: "8px 10px", border: "1.5px solid #c5d8ea", borderRadius: 6, fontSize: 13, background: "#f7fbff", color: "#1a2a3a", outline: "none" },
  label: { fontSize: 11, fontWeight: 700, color: "#1a3c5e", textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 4 },
  td: { border: "1px solid #c5d8ea", padding: "6px 10px", verticalAlign: "top" },
};

function Field({ label, required, children }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <label style={s.label}>{label} {required && <span style={{ color: "#c0392b" }}>*</span>}</label>
      {children}
    </div>
  );
}
function Inp({ value, onChange, placeholder, style }) {
  return <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={{...s.input,...style }} />;
}
function Txt({ value, onChange, placeholder, rows = 3 }) {
  return <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{...s.input, resize: "vertical", width: "100%" }} />;
}
function Sec({ letter, title, color = "#1a3c5e", children }) {
  return (
    <div style={{ marginBottom: 18, background: "#fff", borderRadius: 10, boxShadow: "0 1px 6px #1a3c5e18", overflow: "hidden" }}>
      <div style={{ background: color, padding: "8px 16px", display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ background: "#fff", color: color, borderRadius: "50%", width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 13, flexShrink: 0 }}>{letter}</span>
        <span style={{ color: "#fff", fontWeight: 700, fontSize: 13 }}>{title}</span>
      </div>
      <div style={{ padding: "14px 16px" }}>{children}</div>
    </div>
  );
}
function Preview({ f }) {
  const punti = f.puntiLaterali.filter(p => p.nome);
  const notizie = `Il pilota in comando sig. ${f.nomePilota} dichiara la disponibilità all'immediata interruzione dell'operazione in caso di necessità del gestore tramite comunicazione al numero ${f.telPilota}.\nI droni sono dotati di: RTH (return to home), geofencing.\nIl sorvolo durerà il tempo strettamente necessario all'ottenimento delle riprese e sarà sempre condotto in VLOS.\nNon verranno sorvolati assembramenti ed edifici particolari quali: caserme, ospedali, etc…\n${f.altreNotizie || ""}`.trim();
  return (
    <div style={{ fontFamily: "Georgia, serif", fontSize: 12.5, color: "#1a2a3a", lineHeight: 1.6 }}>
      <div style={{ background: "#1a3c5e", color: "#fff", padding: "10px 16px", borderRadius: "8px 8px 0 0", fontWeight: 800, fontSize: 14 }}>MODELLO ATM-05b — ANTEPRIMA</div>
      <div style={{ border: "1.5px solid #1a3c5e", borderTop: "none", borderRadius: "0 0 8px 8px", padding: 16 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}><tbody>
          <tr><td style={s.td} colSpan={2}><b>A:</b> {f.destA}<br/><b>Cc:</b> {f.destCc}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Richiedente (B):</b> {f.richiedente} – {f.attestato}</td></tr>
          <tr><td style={s.td}><b>Tel:</b> {FIXED.tel360}</td><td style={s.td}><b>Email:</b> {FIXED.email360}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Tipo attività (D):</b> {f.tipoAttivita}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Aeromobile (E):</b> {f.aeromobile}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Decollo (F1):</b> {f.decollo}, Lat N {f.latDecollo} Lon E {f.lonDecollo}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Atterraggio (F2):</b> {f.atterraggio}, Lat N {f.latAtterraggio} Lon E {f.lonAtterraggio}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Località (G):</b> {f.localita}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Zona R/P/D (H):</b> {f.zona}</td></tr>
          {punti.length > 0 && <tr><td style={s.td} colSpan={2}><b>Limiti laterali (I):</b><br/>
            {punti.map((p, i) => <div key={i} style={{ fontSize: 11.5 }}>• {p.nome} — Lat N {p.lat} Lon E {p.lon}</div>)}
          </td></tr>}
          <tr><td style={s.td} colSpan={2}><b>Limiti verticali (J):</b> {f.limVerticali}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Ubicazione (K):</b> {f.capoluogo}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Distanza ARP (L):</b> {f.aeroporto} – {f.distanza}</td></tr>
          <tr><td style={s.td} colSpan={2}><b>Date/Orari (M):</b> {f.dateOrari}</td></tr>
          <tr><td style={s.td} colSpan={2} style={{...s.td, whiteSpace: "pre-line" }}><b>Altre notizie (N):</b><br/>{notizie}</td></tr>
        </tbody></table>
      </div>
    </div>
  );
}

function App() {
  const [f, setF] = useState({...emptyForm });
  const [tab, setTab] = useState("form");
  const [copied, setCopied] = useState(false);

  const set = key => val => setF(p => ({...p, [key]: val }));
  const setPunto = (i, field, val) => {
    const p = [...f.puntiLaterali]; p[i] = {...p[i], [field]: val };
    setF(prev => ({...prev, puntiLaterali: p }));
  };
  const addPunto = () => setF(p => ({...p, puntiLaterali: [...p.puntiLaterali, { nome: "", lat: "", lon: "" }] }));
  const removePunto = i => setF(p => ({...p, puntiLaterali: p.puntiLaterali.filter((_, idx) => idx!== i) }));

  const notizie = `Il pilota in comando sig. ${f.nomePilota} dichiara la disponibilità all'immediata interruzione dell'operazione in caso di necessità del gestore tramite comunicazione al numero ${f.telPilota}.\nI droni sono dotati di: RTH (return to home), geofencing.\nIl sorvolo durerà il tempo strettamente necessario all'ottenimento delle riprese e sarà sempre condotto in VLOS.\nNon verranno sorvolati assembramenti ed edifici particolari quali: caserme, ospedali, etc…\n${f.altreNotizie || ""}`.trim();

  const fullText = `MODELLO ATM-05b\n\nA: ${f.destA}\nCc: ${f.destCc}\n\nRichiedente: ${f.richiedente} – ${f.attestato}\nTel: ${FIXED.tel360}\nEmail: ${FIXED.email360}\n\nTipo attività (D): ${f.tipoAttivita}\nAeromobile (E): ${f.aeromobile}\nDecollo (F1): ${f.decollo}, Lat N ${f.latDecollo} Lon E ${f.lonDecollo}\nAtterraggio (F2): ${f.atterraggio}, Lat N ${f.latAtterraggio} Lon E ${f.lonAtterraggio}\nLocalità (G): ${f.localita}\nZona (H): ${f.zona}\n\nLimiti laterali (I):\n${f.puntiLaterali.filter(p=>p.nome).map(p=>` ${p.nome}, Lat N ${p.lat} Lon E ${p.lon}`).join("\n")}\n\nLimiti verticali (J): ${f.limVerticali}\nUbicazione (K): ${f.capoluogo}\nDistanza ARP (L): ${f.aeroporto} – ${f.distanza}\nDate/Orari (M): ${f.dateOrari}\n\nAltre notizie (N):\n${notizie}`;

  const handleCopy = () => {
    navigator.clipboard.writeText(fullText).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  const btnStyle = active => ({
    padding: "10px 20px", border: "none", cursor: "pointer", fontWeight: active? 800 : 500,
    background: active? "#1a3c5e" : "transparent", color: active? "#fff" : "#1a3c5e",
    fontSize: 13, borderRight: "1px solid #c5d8ea", transition: "all 0.15s",
  });

  const grid2 = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 };

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ background: "#1a3c5e", color: "#fff", padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 12px #0004" }}>
        <div>
          <div style={{ fontSize: 10, opacity: 0.7, letterSpacing: "0.15em", textTransform: "uppercase" }}>360Drone — Permessi di volo</div>
          <div style={{ fontSize: 19, fontWeight: 900 }}>Compilatore ATM-05b</div>
        </div>
        <div style={{ fontSize: 11, textAlign: "right", opacity: 0.85 }}>
          <div>📞 {FIXED.tel360}</div>
          <div>✉️ {FIXED.email360}</div>
        </div>
      </div>

      <div style={{ display: "flex", background: "#e0ecf7", borderBottom: "2px solid #1a3c5e20" }}>
        {[["form","✏️ Compila"],["preview","👁 Anteprima"],["testo","📋 Copia testo"]].map(([k,l]) => (
          <button key={k} onClick={() => setTab(k)} style={btnStyle(tab===k)}>{l}</button>
        ))}
        <button onClick={() => { if(window.confirm("Azzeri tutti i dati del cliente?")) setF({...emptyForm}); }}
          style={{ marginLeft: "auto", padding: "10px 16px", border: "none", cursor: "pointer", background: "transparent", color: "#c0392b", fontSize: 12, fontWeight: 700 }}>
          🗑 Reset
        </button>
      </div>

      <div style={{ maxWidth: 820, margin: "0 auto", padding: "20px 14px 40px" }}>

        {tab === "form" && <>
          <div style={{ background: "#d4edda", border: "1.5px solid #28a745", borderRadius: 8, padding: "9px 14px", marginBottom: 18, fontSize: 12.5, color: "#155724" }}>
            ✅ <b>Dati fissi 360Drone:</b> Tel: {FIXED.tel360} — Email: {FIXED.email360}
          </div>

          <Sec letter="A" title="Destinatari PEC">
            <Field label="A — Destinatario principale"><Inp value={f.destA} onChange={set("destA")} placeholder="A:" /></Field>
            <Field label="Cc — In copia"><Txt value={f.destCc} onChange={set("destCc")} rows={2} placeholder="Cc:" /></Field>
          </Sec>

          <Sec letter="B" title="Richiedente / Attestato" color="#2471a3">
            <div style={grid2}>
              <Field label="Nome e cognome pilota" required><Inp value={f.richiedente} onChange={set("richiedente")} placeholder="Es. Mario Rossi" /></Field>
              <Field label="Numero attestato" required><Inp value={f.attestato} onChange={set("attestato")} placeholder="Es. A1/A3 n. LUX-RP-..." /></Field>
            </div>
          </Sec>

          <Sec letter="D" title="Tipo di attività" color="#1e8449">
            <Field label="Descrizione" required><Txt value={f.tipoAttivita} onChange={set("tipoAttivita")} rows={2} placeholder="Es. riprese video e foto aeree per motivi personali - volo VLOS" /></Field>
          </Sec>

          <Sec letter="E" title="Tipo di aeromobile" color="#7d3c98">
            <Field label="Modello (peso, categoria)" required><Inp value={f.aeromobile} onChange={set("aeromobile")} placeholder="Es. DJI Mini 3 – (249 g – C0)" /></Field>
          </Sec>

          <Sec letter="F" title="Decollo e Atterraggio" color="#c0392b">
            <Field label="F1 — Località di decollo" required>
              <Inp value={f.decollo} onChange={set("decollo")} placeholder="Es. Ponte Sant'Angelo" style={{ marginBottom: 6 }} />
              <div style={grid2}>
                <Inp value={f.latDecollo} onChange={set("latDecollo")} placeholder='Lat N es. 41°:54&apos;:07"' />
                <Inp value={f.lonDecollo} onChange={set("lonDecollo")} placeholder='Lon E es. 12°:27&apos;:59"' />
              </div>
            </Field>
            <Field label="F2 — Atterraggio (se diverso)">
              <Inp value={f.atterraggio} onChange={set("atterraggio")} placeholder="Lascia vuoto se uguale al decollo" style={{ marginBottom: 6 }} />
              <div style={grid2}>
                <Inp value={f.latAtterraggio} onChange={set("latAtterraggio")} placeholder="Lat N" />
                <Inp value={f.lonAtterraggio} onChange={set("lonAtterraggio")} placeholder="Lon E" />
              </div>
            </Field>
          </Sec>

          <Sec letter="G" title="Località attività" color="#1a5276">
            <Field label="Comune / Città" required><Inp value={f.localita} onChange={set("localita")} placeholder="Es. Roma" /></Field>
          </Sec>

          {/* ✅ MODIFICATO QUI */}
          <Sec letter="H" title="Zona R, P o D" color="#6e2f1a">
            <Field label="Denominazione zona (AIP-Italia)" required>
              <select
                value={f.zona}
                onChange={(e) => {
                  const valore = e.target.value;
                  set("zona")(valore);
                  const d = destinatari[valore];
                  if (d) {
                    set("destA")(d.A);
                    set("destCc")(d.Cc);
                  }
                }}
                style={{...s.input, appearance: "none" }}
              >
                <option value="">Seleziona...</option>
                <option value="LI P244">LI P244 - Roma</option>
                <option value="R1">R1 - Zona aeroportuale</option>
                <option value="P123">P123 - Zona proibita</option>
              </select>
            </Field>
          </Sec>

          <Sec letter="I" title="Limiti laterali — Coordinate" color="#0e6655">
            {f.puntiLaterali.map((p, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "2fr 1.5fr 1.5fr auto", gap: 8, marginBottom: 8, alignItems: "end" }}>
                {i === 0 && <><label style={s.label}>Località</label><label style={s.label}>Lat N</label><label style={s.label}>Lon E</label><span/></>}
                <Inp value={p.nome} onChange={v => setPunto(i,"nome",v)} placeholder="Luogo" />
                <Inp value={p.lat} onChange={v => setPunto(i,"lat",v)} placeholder='41°:54&apos;:07"' />
                <Inp value={p.lon} onChange={v => setPunto(i,"lon",v)} placeholder='12°:27&apos;:59"' />
                <button onClick={() => removePunto(i)} style={{ background:"#fee",border:"1px solid #fbb",borderRadius:6,padding:"7px 10px",cursor:"pointer",color:"#c0392b",fontSize:16 }}>✕</button>
              </div>
            ))}
            <button onClick={addPunto} style={{ background:"#e8f5e9",border:"1.5px dashed #27ae60",borderRadius:6,padding:"7px 16px",cursor:"pointer",color:"#1e8449",fontSize:12.5,fontWeight:700 }}>
              + Aggiungi punto
            </button>
          </Sec>

          <Sec letter="J" title="Limiti verticali" color="#2c3e50">
            <Field label="Inferiore / superiore"><Inp value={f.limVerticali} onChange={set("limVerticali")} placeholder="Es. inferiore GND / superiore 45 m AGL (147 ft)" /></Field>
          </Sec>

          <Sec letter="K" title="Capoluogo di riferimento" color="#1a3c5e">
            <Field label="Città" required><Inp value={f.capoluogo} onChange={set("capoluogo")} placeholder="Es. Roma" /></Field>
          </Sec>

          <Sec letter="L" title="Distanza dall'ARP" color="#4a235a">
            <div style={grid2}>
              <Field label="Aeroporto" required><Inp value={f.aeroporto} onChange={set("aeroporto")} placeholder="Es. ROMA URBE 16/34" /></Field>
              <Field label="Distanza" required><Inp value={f.distanza} onChange={set("distanza")} placeholder="Es. 3,02 NM (5,6 Km)" /></Field>
            </div>
          </Sec>

          <Sec letter="M" title="Date e orari" color="#922b21">
            <Field label="Date e orari attività" required>
              <Txt value={f.dateOrari} onChange={set("dateOrari")} rows={3} placeholder="Es. 9, 10, 11, 12 settembre 2025 dalle ore 05:00 UTC alle ore 10:00 UTC" />
            </Field>
            <div style={{ fontSize: 11, color: "#c0392b", marginTop: -6 }}>⚠️ Orario sempre in UTC, non ora italiana!</div>
          </Sec>

          <Sec letter="N" title="Altre notizie utili" color="#1e5799">
            <div style={grid2}>
              <Field label="Nome pilota in comando" required><Inp value={f.nomePilota} onChange={set("nomePilota")} placeholder="Es. Mario Rossi" /></Field>
              <Field label="Telefono pilota" required><Inp value={f.telPilota} onChange={set("telPilota")} placeholder="Es. 339 5746866" /></Field>
            </div>
            <Field label="Note aggiuntive (opzionale)"><Txt value={f.altreNotizie} onChange={set("altreNotizie")} rows={2} placeholder="Eventuali informazioni extra..." /></Field>
          </Sec>

          <div style={{ textAlign:"center", marginTop:8 }}>
            <button onClick={() => setTab("preview")} style={{ background:"#1a3c5e",color:"#fff",border:"none",borderRadius:8,padding:"12px 32px",fontSize:14,fontWeight:700,cursor:"pointer" }}>
              👁 Vedi anteprima →
            </button>
          </div>
        </>}

        {tab === "preview" && <>
          <Preview f={f} />
          <div style={{ marginTop:16, display:"flex", gap:12, justifyContent:"center" }}>
            <button onClick={() => setTab("form")} style={{ background:"#fff",color:"#1a3c5e",border:"2px solid #1a3c5e",borderRadius:8,padding:"10px 22px",fontSize:13,fontWeight:700,cursor:"pointer" }}>← Modifica</button>
            <button onClick={() => setTab("testo")} style={{ background:"#1a3c5e",color:"#fff",border:"none",borderRadius:8,padding:"10px 22px",fontSize:13,fontWeight:700,cursor:"pointer" }}>📋 Copia testo →</button>
          </div>
        </>}

        {tab === "testo" && <>
          <div style={{ background:"#fff",borderRadius:10,boxShadow:"0 1px 8px #1a3c5e18",overflow:"hidden" }}>
            <div style={{ background:"#1a3c5e",color:"#fff",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
              <span style={{ fontWeight:700 }}>📄 Testo pronto da copiare</span>
              <button onClick={handleCopy} style={{ background:copied?"#27ae60":"#fff",color:copied?"#fff":"#1a3c5e",border:"none",borderRadius:6,padding:"6px 16px",fontWeight:700,cursor:"pointer",fontSize:13,transition:"all 0.2s" }}>
                {copied? "✅ Copiato!" : "📋 Copia"}
              </button>
            </div>
            <pre style={{ padding:20,margin:0,whiteSpace:"pre-wrap",wordBreak:"break-word",fontSize:12.5,fontFamily:"Georgia,serif",color:"#1a2a3a",lineHeight:1.8 }}>
              {fullText}
            </pre>
          </div>
          <div style={{ marginTop:12,textAlign:"center" }}>
            <button onClick={() => setTab("form")} style={{ background:"#fff",color:"#1a3c5e",border:"2px solid #1a3c5e",borderRadius:8,padding:"10px 22px",fontSize:13,fontWeight:700,cursor:"pointer" }}>← Torna al modulo</button>
          </div>
        </>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
