/* ═══════════════════════════════════════════════
   VALIDAZIONE
═══════════════════════════════════════════════ */
function valida(f) {
  const warn = []; const err = [];
  
  // Controllo date anticipo 15 gg
  if (f.dateOrari) {
    const oggi = new Date();
    const match = f.dateOrari.match(/(\d{1,2})[\/\-\s](\w+)[\/\-\s]?(\d{4})?/);
    if (match) {
      const mesi = {gennaio:0,febbraio:1,marzo:2,aprile:3,maggio:4,giugno:5,luglio:6,agosto:7,settembre:8,ottobre:9,novembre:10,dicembre:11};
      const meseNum = mesi[match[2]?.toLowerCase()];
      if (meseNum !== undefined) {
        const anno = match[3] ? parseInt(match[3]) : oggi.getFullYear();
        const dataVolo = new Date(anno, meseNum, parseInt(match[1]));
        const diff = (dataVolo - oggi) / (1000*60*60*24);
        if (diff < 0) err.push({ tipo:"errore", msg:"⛔ Le date inserite sono già passate!" });
        else if (diff < 15) err.push({ tipo:"errore", msg:`⛔ Anticipo insufficiente: ${Math.round(diff)} giorni. Servono ALMENO 15 giorni prima dell'attività.` });
        else if (diff < 20) warn.push({ tipo:"avviso", msg:`⚠️ Anticipo breve: ${Math.round(diff)} giorni. Consigliati almeno 20 giorni per sicurezza.` });
      }
    }
  }
  
  // Controllo licenza vs drone
  const licOk = { "A1":["A1","A2","A3"], "A2":["A2","A3"], "A3":["A3"] };
  const droneObj = DRONI.find(d=>d.label===f.dronePreset);
  if (droneObj && droneObj.licMin && f.tipoLic) {
    const licenze_accettate = licOk[droneObj.licMin] || [];
    if (!licenze_accettate.includes(f.tipoLic)) {
      err.push({ tipo:"errore", msg:`⛔ LICENZA INCOMPATIBILE: ${f.dronePreset} richiede almeno patentino ${droneObj.licMin}, ma il pilota ha ${f.tipoLic}.` });
    }
  }
  
  // Zona P con drone >4kg
  const zoneObj = ZONE_DB[f.zona];
  if (zoneObj?.tipo === "P" && droneObj && droneObj.peso > 900) {
    warn.push({ tipo:"avviso", msg:"⚠️ Drone pesante in zona P: le probabilità di autorizzazione sono molto basse. Considera un drone <250g." });
  }
  
  // Zona R militare
  if (f.zona && f.zona.includes("Militare")) {
    warn.push({ tipo:"avviso", msg:"⚠️ Zona militare: richiedere anche nulla osta al comando militare competente. Anticipo consigliato 30 giorni." });
  }
  
  // Attestato mancante
  if (!f.attestato && f.richiedente) {
    err.push({ tipo:"errore", msg:"⛔ Numero attestato/patentino mancante: campo obbligatorio." });
  }
  
  // Destinatario vuoto
  if (!f.destA) {
    warn.push({ tipo:"avviso", msg:"⚠️ Email destinatario (A) non compilata. Seleziona la zona per auto-compilarla." });
  }
  
  // Ricordare NOTAM
  warn.push({ tipo:"info", msg:"ℹ️ Ricorda di verificare i NOTAM attivi su ENAV prima di inviare la richiesta." });
  
  // Ricordare bollo
  if (zoneObj?.tipo === "P") {
    warn.push({ tipo:"info", msg:"ℹ️ Zona P: allegare marca da bollo €16 (o pagamento virtuale) alla PEC." });
  }
  
  return [...err, ...warn];
}

/* ═══════════════════════════════════════════════
   AI ASSISTANT
═══════════════════════════════════════════════ */
function AIAssistant({ f, setF, apiKey }) {
  const [input, setInput] = useState("");
  const [risposta, setRisposta] = useState("");
  const [loading, setLoading] = useState(false);

  const chiedi = async () => {
    if (!apiKey) { setRisposta("⚠️ Inserisci prima la tua API Key Claude nella sezione Impostazioni."); return; }
    if (!input.trim()) return;
    setLoading(true); setRisposta("");

    const sys = `Sei un assistente esperto di permessi di volo droni in Italia per la società 360 Drone.
Il tuo compito è aiutare a compilare il modello ATM-05b per richieste di autorizzazione volo in zone P/R/D.
Dati fissi 360Drone: Tel ${FIXED.tel}, Email ${FIXED.email}.
Quando l'utente ti descrive una situazione o incolla un link, estrai le informazioni rilevanti e rispondi SEMPRE con un JSON valido (e solo quello, senza markdown) con i campi che riesci a determinare tra questi:
richiedente, attestato, tipoLic (A1/A2/A3), aeromobile, tipoAttivita, decollo, latDecollo, lonDecollo, atterraggio, latAtterraggio, lonAtterraggio, localita, zona, capoluogo, aeroporto, distanza, dateOrari, nomePilota, telPilota, altreNotizie.
Se non riesci a determinare un campo, omettilo dal JSON.
Aggiungi sempre un campo "note_ai" con spiegazioni, avvisi importanti, e se c'è un link NOTAM o D-Flight, verifica la zona e segnala eventuali criticità.
Se l'utente chiede informazioni generali (non compilazione), rispondi in italiano come testo normale (non JSON).`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:2000,
          system: sys,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:input}]
        })
      });
      const data = await res.json();
      const testo = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
      
      // Prova a parsare JSON per auto-fill
      try {
        const clean = testo.replace(/```json|```/g,"").trim();
        const j = JSON.parse(clean);
        const note = j.note_ai || "";
        delete j.note_ai;
        // Auto-fill campi non vuoti
        const update = {};
        Object.keys(j).forEach(k=>{ if(j[k] && empty.hasOwnProperty(k)) update[k]=j[k]; });
        if (Object.keys(update).length > 0) setF(prev=>({...prev,...update}));
        setRisposta("✅ Campi aggiornati automaticamente!\n\n" + (note || "Nessuna nota aggiuntiva dall'AI."));
      } catch {
        setRisposta(testo || "Nessuna risposta ricevuta.");
      }
    } catch(e) {
      setRisposta("❌ Errore: " + e.message);
    }
    setLoading(false);
  };

  return (
    <div>
      <p style={{fontSize:13,color:"#555",marginBottom:12}}>Descrivi la situazione, incolla coordinate, link D-Flight, o chiedi informazioni. L'AI compilerà i campi automaticamente e segnalerà problemi.</p>
      <Txt value={input} onChange={setInput} rows={4}
        placeholder="Es: 'Devo volare il 15 luglio a Firenze in zona LI R34 con DJI Mini 3. Il pilota Mario Rossi ha patentino A1 n. LUX-RP-... Coordinate zona: 43.7696°N, 11.2558°E'"/>
      <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap"}}>
        <Btn onClick={chiedi} color="#7d3c98">{loading?"⏳ Elaborazione...":"🤖 Compila con AI"}</Btn>
        <Btn onClick={()=>{setInput("Verifica se ci sono NOTAM attivi per la zona "+f.zona+" area "+f.localita+" nelle date "+f.dateOrari);}} color="#2471a3" style={{fontSize:12}}>🔍 Cerca NOTAM</Btn>
        <Btn onClick={()=>{setInput("Il pilota "+f.richiedente+" con attestato "+f.attestato+" ("+f.tipoLic+") può volare con "+f.aeromobile+" in zona "+f.zona+"? Ci sono problemi legali?");}} color="#1e8449" style={{fontSize:12}}>✅ Verifica idoneità</Btn>
      </div>
      {risposta && (
        <div style={{marginTop:14,background:"#f0f6ff",border:"1.5px solid #1a3c5e33",borderRadius:8,padding:"12px 14px",fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.7,color:"#1a2a3a"}}>
          {risposta}
        </div>
      )}
      <div style={{marginTop:12,borderTop:"1px solid #eee",paddingTop:10}}>
        <p style={{fontSize:11,fontWeight:700,color:"#1a3c5e",marginBottom:6}}>LINK UTILI</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {LINK_UTILI.map((l,i)=>(
            <a key={i} href={l.url} target="_blank" rel="noopener"
               style={{fontSize:11.5,padding:"4px 10px",background:"#e8f0f7",borderRadius:20,color:"#1a3c5e",textDecoration:"none",border:"1px solid #c5d8ea"}}>
              {l.label}
            </a>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP PRINCIPALE

export default function App() {
  const [f, setF] = useState({...empty});
  const [tab, setTab] = useState("form");
  const [apiKey, setApiKey] = useState("");
  const [showKey, setShowKey] = useState(false);
  const [pdfLoading, setPdfLoading] = useState(false);

  // Persistenza localStorage
  useEffect(()=>{ try { const s=localStorage.getItem("atm05b"); if(s) setF(JSON.parse(s)); const k=localStorage.getItem("apikey"); if(k) setApiKey(k); } catch{} },[]);
  useEffect(()=>{ try { localStorage.setItem("atm05b",JSON.stringify(f)); } catch{} },[f]);
  useEffect(()=>{ try { localStorage.setItem("apikey",apiKey); } catch{} },[apiKey]);

  const set = k => v => setF(p=>({...p,[k]:v}));
  const g2 = {display:"grid",gridTemplateColumns:"1fr 1fr",gap:12};

  // Selezione zona → auto-fill email
  const selZona = (v) => {
    const z = ZONE_DB[v];
    if (!z) { set("zona")(v); return; }
    let destA = z.A;
    if (z.needsProv && f.provincia) destA = z.A.replace("{PROV}", f.provincia.toLowerCase());
    setF(p=>({...p, zona:v, destA: z.needsProv ? (f.provincia ? destA : "") : destA, destCc: z.Cc}));
  };

  const selProv = (v) => {
    const z = ZONE_DB[f.zona];
    let destA = f.destA;
    if (z?.needsProv) destA = z.A.replace("{PROV}", v.toLowerCase());
    setF(p=>({...p, provincia:v, destA}));
  };

  // Estrai coordinate da link Google Maps
  const estraiCoord = (testo) => {
    const re = /@(-?\d+\.?\d*),(-?\d+\.?\d*)/;
    const m = testo.match(re);
    if (m) {
      const lat = parseFloat(m[1]).toFixed(6);
      const lon = parseFloat(m[2]).toFixed(6);
      setF(p=>({...p, latDecollo:lat, lonDecollo:lon, latAtterraggio:lat, lonAtterraggio:lon}));
      alert(`✅ Coordinate estratte:\nLat: ${lat}\nLon: ${lon}`);
    } else {
      alert("Nessuna coordinata trovata nel testo. Incolla un link Google Maps tipo: https://maps.google.com/@41.9027,12.4963,17z");
    }
  };

  const allarmi = valida(f);

  // PDF Export
  const generaPDF = async () => {
    setPdfLoading(true);
    const html = buildPdfHtml(f);
    const el = document.createElement("div");
    el.innerHTML = html;
    document.body.appendChild(el);
    const opt = {
      margin:[0,0,0,0], filename:`ATM-05b_${f.nomePilota||"richiesta"}_${f.dataRichiesta.replace(/\//g,"-")}.pdf`,
      image:{type:"jpeg",quality:0.98}, html2canvas:{scale:2,useCORS:true}, jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
    };
    await html2pdf().set(opt).from(el.querySelector(".page,.page-break") ? el : el.firstChild).save();
    document.body.removeChild(el);
    setPdfLoading(false);
  };

  const TABS = [["form","✏️ Compila"],["alert","🚨 Allarmi"],["ai","🤖 AI"],["settings","⚙️"]];

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"#1a3c5e",color:"#fff",padding:"12px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 2px 10px #0004"}}>
        <div>
          <div style={{fontSize:9,opacity:.65,letterSpacing:".15em",textTransform:"uppercase"}}>360Drone – Permessi di volo</div>
          <div style={{fontSize:18,fontWeight:900}}>Compilatore ATM-05b</div>
        </div>
        <div style={{fontSize:10.5,textAlign:"right",opacity:.85}}>📞 {FIXED.tel}<br/>✉️ {FIXED.email}</div>
      </div>

      {/* Allarmi bar */}
      {allarmi.filter(a=>a.tipo==="errore").length > 0 && (
        <div style={{background:"#c0392b",color:"#fff",padding:"8px 18px",fontSize:12.5,fontWeight:700,cursor:"pointer"}} onClick={()=>setTab("alert")}>
          ⛔ {allarmi.filter(a=>a.tipo==="errore").length} ERRORI critici — clicca per vedere gli allarmi
        </div>
      )}

      {/* Tabs */}
      <div style={{display:"flex",background:"#e0ecf7",borderBottom:"2px solid #1a3c5e22"}}>
        {TABS.map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{padding:"10px 16px",border:"none",cursor:"pointer",fontWeight:tab===k?800:500,background:tab===k?"#1a3c5e":"transparent",color:tab===k?"#fff":"#1a3c5e",fontSize:13,borderRight:"1px solid #c5d8ea",position:"relative"}}>
            {l}
            {k==="alert" && allarmi.filter(a=>a.tipo==="errore").length > 0 && <span style={{position:"absolute",top:4,right:4,background:"#c0392b",color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:9,display:"grid",placeItems:"center"}}>{allarmi.filter(a=>a.tipo==="errore").length}</span>}
          </button>
        ))}
        <Btn onClick={()=>{if(window.confirm("Cancellare tutti i dati del cliente?"))setF({...empty});}} color="#c0392b" style={{marginLeft:"auto",padding:"8px 14px",fontSize:11,borderRadius:0}}>🗑 Reset</Btn>
      </div>

      <div style={{maxWidth:840,margin:"0 auto",padding:"16px 12px 60px"}}>

        {/* ── TAB FORM ─────────────────────────────── */}
        {tab==="form" && <>

          {/* Zona → auto email */}
          <Sec letter="H" title="Zona R, P o D — seleziona per auto-compilare email" color="#6e2f1a">
            <F label="Tipo di zona" required>
              <select value={f.zona} onChange={e=>selZona(e.target.value)} style={si.inp}>
                <option value="">— Seleziona zona —</option>
                {Object.keys(ZONE_DB).map(k=><option key={k} value={k}>{ZONE_DB[k].badge} {k}</option>)}
              </select>
            </F>
            {ZONE_DB[f.zona]?.needsProv && (
              <F label="Provincia">
                <select value={f.provincia} onChange={e=>selProv(e.target.value)} style={si.inp}>
                  <option value="">— Seleziona provincia —</option>
                  {PROVINCE.map(p=><option key={p} value={p}>{p}</option>)}
                </select>
              </F>
            )}
            {f.zona && ZONE_DB[f.zona] && (
              <div style={{background:"#fff3cd",border:"1px solid #ffc107",borderRadius:6,padding:"8px 12px",fontSize:12.5,color:"#856404",marginTop:6}}>
                {ZONE_DB[f.zona].avviso}
              </div>
            )}
          </Sec>

          <Sec letter="A" title="Destinatari PEC (auto-compilati dalla zona)">
            <F label="A — Destinatario principale">
              <Inp value={f.destA} onChange={set("destA")} placeholder="Seleziona zona qui sopra per auto-compilare"/>
            </F>
            <F label="Cc — In copia">
              <Txt value={f.destCc} onChange={set("destCc")} rows={2}/>

          </Sec>

          <Sec letter="B" title="Richiedente / Attestato" color="#2471a3">

                <Inp value={f.richiedente} onChange={set("richiedente")} placeholder="Es. Mario Rossi"/>
              </F>

              </F>
            </div>
            <div style={g2}>
              <F label="Numero attestato UAS" required>
                <Inp value={f.attestato} onChange={set("attestato")} placeholder="Es. LUX-RP-19930106xxxx"/>
              </F>

                  <option value="">— Tipo —</option>
                  <option value="A1">A1 (max 900g, vicino a persone)</option>
                  <option value="A2">A2 (max 4kg, distanza sicura)</option>
                  <option value="A3">A3 (>4kg, lontano da persone)</option>

              </F>
            </div>
            <div style={g2}>

                <Inp value={f.telPilota} onChange={set("telPilota")} placeholder="Es. 339 5746866"/>

                placeholder="Es. riprese video e foto aeree per documentazione - volo VLOS"/>
            </F>
          </Sec>

          <Sec letter="E" title="Aeromobile" color="#7d3c98">
            <F label="Scegli drone (pre-compilato)">
              <select value={f.dronePreset} onChange={e=>{
                const d=DRONI.find(x=>x.label===e.target.value);
                set("dronePreset")(e.target.value);
                if(d&&d.peso>0) set("aeromobile")(d.label);

                <option value="">— Seleziona modello —</option>
                {DRONI.map(d=><option key={d.label} value={d.label}>{d.label}</option>)}
              </select>
            </F>

              <Inp value={f.aeromobile} onChange={set("aeromobile")} placeholder="Es. DJI Mini 3 – 249g – Categoria C0"/>

            <F label="F1 — Località di decollo" required>

              <div style={g2}>
                <Inp value={f.latDecollo} onChange={set("latDecollo")} placeholder='Lat N es. 41°54\'07"'/>
                <Inp value={f.lonDecollo} onChange={set("lonDecollo")} placeholder='Lon E es. 12°27\'59"'/>

            <F label="F2 — Atterraggio (lascia vuoto se uguale)">

              <div style={g2}>
                <Inp value={f.latAtterraggio} onChange={set("latAtterraggio")} placeholder="Lat N"/>

          <Sec letter="G·K" title="Località e Capoluogo" color="#1a5276">

              <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1.5fr auto",gap:8,marginBottom:8,alignItems:"end"}}>

                <Inp value={p.lat}  onChange={v=>{const ps=[...f.puntiLaterali];ps[i]={...ps[i],lat:v};setF(prev=>({...prev,puntiLaterali:ps}));}} placeholder='41°54\'07"'/>
                <Inp value={p.lon}  onChange={v=>{const ps=[...f.puntiLaterali];ps[i]={...ps[i],lon:v};setF(prev=>({...prev,puntiLaterali:ps}));}} placeholder='12°27\'59"'/>
                <button onClick={()=>setF(prev=>({...prev,puntiLaterali:prev.puntiLaterali.filter((_,idx)=>idx!==i)}))}

              </div>

            <Btn onClick={()=>setF(p=>({...p,puntiLaterali:[...p.puntiLaterali,{nome:"",lat:"",lon:""}]}))} color="#0e6655" style={{fontSize:12}}>+ Aggiungi punto</Btn>

          <Sec letter="L" title="Distanza dall'ARP" color="#4a235a">
            <div style={g2}>
              <F label="Aeroporto di riferimento"><Inp value={f.aeroporto} onChange={set("aeroporto")} placeholder="Es. ROMA URBE 16/34"/></F>
              <F label="Distanza"><Inp value={f.distanza} onChange={set("distanza")} placeholder="Es. 3,02 NM (5,6 km)"/></F>

            <F label="Date e orari attività" required>
              <Txt value={f.dateOrari} onChange={set("dateOrari")} rows={3}

            </F>

              }}>

                  </button>
                </div>
                <div style={{fontSize:11,color:"#888",marginTop:4}}>Ottieni la tua chiave su <a href="https://console.anthropic.com/keys" target="_blank" rel="noopener" style={{color:"#1a3c5e"}}>console.anthropic.com/keys</a>. La chiave non lascia il tuo dispositivo.</div>
              </F>
            </Sec>
            <Sec letter="📎" title="Link e riferimenti normativi">
              {LINK_UTILI.map((l,i)=>(
                <div key={i} style={{marginBottom:8}}>
                  <a href={l.url} target="_blank" rel="noopener" style={{color:"#1a3c5e",fontSize:13,display:"flex",alignItems:"center",gap:6}}>
                    {l.label} <span style={{fontSize:10,opacity:.6}}>↗</span>
                  </a>
                </div>
              ))}
            </Sec>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
