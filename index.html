<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360Drone – Compilatore ATM-05b</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #e8f0f7 0%, #f5f9ff 100%); min-height: 100vh; font-family: 'Trebuchet MS', Georgia, serif; }
    input, textarea, button, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #1a3c5e44; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const FIXED = { tel360: "0187 1755700", email360: "360drone@pec.it" };

// ✅ DATI DA ZONE.JS - IDENTICI AI TUOI
const destinatari = {
  "LI P244": { A: "protocollo.prefrm@pec.interno.it", Cc: "protocollo@pec.enac.gov.it; mobilita.innovativa@enac.gov.it" },
  "R1": { A: "operazioni@enav.it", Cc: "mobilita.innovativa@enac.gov.it" },
  "P123": { A: "enac@pec.enac.gov.it", Cc: "" },
};

const riferimenti = {
  regolamenti: [
    { nome: "Reg. (UE) 947/2019", url: "https://eur-lex.europa.eu/eli/reg/2019/947" },
    { nome: "ATM-05b", url: "https://www.enac.gov.it/sites/default/files/allegati/2021-01/ATM-05b.pdf" },
    { nome: "ATM-09a", url: "https://www.enac.gov.it/sites/default/files/allegati/2021-01/ATM-09a.pdf" },
    { nome: "UAS Italia", url: "https://www.enac.gov.it/mezzi-aerei-a-piloti-remote" },
  ],
};

const emptyForm = {
  destA: "protocollo.prefrm@pec.interno.it",
  destCc: "protocollo@pec.enac.gov.it; mobilita.innovativa@enac.gov.it",
  richiedente: "", attestato: "", tipoAttivita: "", aeromobile: "",
  decollo: "", latDecollo: "", lonDecollo: "", atterraggio: "", latAtterraggio: "", lonAtterraggio: "",
  localita: "", zona: "", puntiLaterali: [{ nome: "", lat: "", lon: "" }, { nome: "", lat: "", lon: "" }],
  limVerticali: "inferiore GND / superiore 45 m AGL (147 ft)", capoluogo: "", aeroporto: "", distanza: "",
  dateOrari: "", nomePilota: "", telPilota: "", altreNotizie: "",
};

const s = {
  input: { width: "100%", padding: "8px 10px", border: "1.5px solid #c5d8ea", borderRadius: 6, fontSize: 13, background: "#f7fbff", color: "#1a2a3a", outline: "none" },
  label: { fontSize: 11, fontWeight: 700, color: "#1a3c5e", textTransform: "uppercase", letterSpacing: "0.06em", display: "block", marginBottom: 4 },
  td: { border: "1px solid #c5d8ea", padding: "6px 10px", verticalAlign: "top" },
};

function Field({ label, required, children }) { return (<div style={{ marginBottom: 10 }}><label style={s.label}>{label} {required && <span style={{ color: "#c0392b" }}>*</span>}</label>{children}</div>); }
function Inp(props) { return <input {...props} onChange={e=>props.onChange(e.target.value)} style={{...s.input,...props.style}} />; }
function Txt(props) { return <textarea {...props} onChange={e=>props.onChange(e.target.value)} rows={props.rows||3} style={{...s.input, resize:"vertical"}} />; }
function Sec({ letter, title, color="#1a3c5e", children }) { return (<div style={{marginBottom:18,background:"#fff",borderRadius:10,boxShadow:"0 1px 6px #1a3c5e18",overflow:"hidden"}}><div style={{background:color,padding:"8px 16px",display:"flex",gap:10,alignItems:"center"}}><span style={{background:"#fff",color,borderRadius:"50%",width:24,height:24,display:"grid",placeItems:"center",fontWeight:900,fontSize:13}}>{letter}</span><span style={{color:"#fff",fontWeight:700,fontSize:13}}>{title}</span></div><div style={{padding:"14px 16px"}}>{children}</div></div>); }

function App() {
  const [f, setF] = useState({...emptyForm});
  const [tab, setTab] = useState("form");
  useEffect(()=>{ const s=localStorage.getItem('atm05'); if(s) setF(JSON.parse(s)); },[]);
  useEffect(()=>{ localStorage.setItem('atm05', JSON.stringify(f)); },[f]);

  const set = k => v => setF(p=>({...p,[k]:v}));
  const setPunto = (i,field,v)=>{ const p=[...f.puntiLaterali]; p[i]={...p[i],[field]:v}; setF(prev=>({...prev,puntiLaterali:p})); };
  const grid2 = {display:"grid",gridTemplateColumns:"1fr 1fr",gap:12};

  return (
    <div>
      <div style={{background:"#1a3c5e",color:"#fff",padding:"14px 20px",display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:10,opacity:.7}}>360DRONE — PERMESSI DI VOLO</div><div style={{fontSize:19,fontWeight:900}}>Compilatore ATM-05b</div></div><div style={{fontSize:11,textAlign:"right"}}>📞 {FIXED.tel360}<br/>✉️ {FIXED.email360}</div></div>

      <div style={{maxWidth:820,margin:"0 auto",padding:"20px 14px"}}>
        <Sec letter="A" title="Destinatari PEC"><Field label="A — Destinatario"><Inp value={f.destA} onChange={set("destA")}/></Field><Field label="Cc"><Txt value={f.destCc} onChange={set("destCc")} rows={2}/></Field></Sec>

        <Sec letter="H" title="Zona R, P o D" color="#6e2f1a">
          <Field label="Denominazione zona" required>
            <select value={f.zona} onChange={e=>{ const v=e.target.value; set("zona")(v); const d=destinatari[v]; if(d){ set("destA")(d.A); set("destCc")(d.Cc); } }} style={s.input}>
              <option value="">Seleziona...</option>
              {Object.keys(destinatari).map(k=> <option key={k} value={k}>{k}</option>)}
            </select>
          </Field>
        </Sec>

        <Sec letter="N" title="Altre notizie utili" color="#1e5799">
          <div style={grid2}><Field label="Nome pilota" required><Inp value={f.nomePilota} onChange={set("nomePilota")}/></Field><Field label="Tel pilota" required><Inp value={f.telPilota} onChange={set("telPilota")}/></Field></div>
        </Sec>

        {/* ✅ SEZIONE Z CON I TUOI LINK */}
        <Sec letter="Z" title="Riferimenti utili" color="#1a3c5e">
          <ul style={{fontSize:13,lineHeight:1.8,paddingLeft:18}}>
            {riferimenti.regolamenti.map((r,i)=>(
              <li key={i}><a href={r.url} target="_blank" rel="noopener" style={{color:"#1a3c5e",textDecoration:"underline"}}>{r.nome}</a></li>
            ))}
          </ul>
        </Sec>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
